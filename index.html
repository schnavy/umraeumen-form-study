<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="c"></canvas>
<div id="info">order ↔ chaos</div>

<div id="panel">
  <div class="p-head">
    <span>Umräumen Form Generator</span>
    <button id="p-collapse">-</button>
  </div>
  <div id="p-body">
    <div class="sec">form base</div>
    <div class="row"><span class="lbl">circles</span> <input type="range" id="s-n" min="5" max="30" step="1" value="14"> <span class="val" id="v-n">14</span></div>
    <div class="row"><span class="lbl">melting</span> <input type="range" id="s-k" min="3" max="80" step="1" value="15"> <span class="val" id="v-k">0.015</span></div>

    <div class="sec">ordered state</div>
    <div class="row"><span class="lbl">size</span>    <input type="range" id="s-osz" min="10" max="80" step="1" value="31"> <span class="val" id="v-osz">0.31</span></div>

    <div class="sec">organic state</div>
    <div class="row"><span class="lbl">offset</span>    <input type="range" id="s-off" min="0"  max="25"  step="1"  value="11">  <span class="val" id="v-off">0.11</span></div>
    <div class="row"><span class="lbl">size</span>      <input type="range" id="s-sz"  min="20" max="200" step="5"  value="140"> <span class="val" id="v-sz">1.4×</span></div>
    <div class="row"><span class="lbl">variation</span> <input type="range" id="s-var" min="0"  max="150" step="5"  value="55">  <span class="val" id="v-var">0.55</span></div>

    <div class="sec">curve geometry</div>
    <div class="row"><span class="lbl">margin</span>  <input type="range" id="s-mg"    min="2"  max="30"  step="1" value="8">  <span class="val" id="v-mg">0.08</span></div>
    <div class="row"><span class="lbl">depth</span>   <input type="range" id="s-dp"    min="50" max="97"  step="1" value="67"> <span class="val" id="v-dp">0.67</span></div>
    <div class="row"><span class="lbl">curve</span>   <input type="range" id="s-curve" min="5"  max="80"  step="1" value="25"> <span class="val" id="v-curve">2.5</span></div>
    <div class="row"><span class="lbl">sides</span>   <input type="range" id="s-sides" min="0"  max="100" step="1" value="78"> <span class="val" id="v-sides">0.78</span></div>
    <div class="row"><span class="lbl">padding</span> <input type="range" id="s-pad"   min="0"  max="20"  step="1" value="0">  <span class="val" id="v-pad">0%</span></div>

    <div class="sec">timing</div>
    <div class="row"><span class="lbl">hold</span>    <input type="range" id="s-hold" min="1" max="30" step="1" value="5"> <span class="val" id="v-hold">5s</span></div>
    <div class="row"><span class="lbl">ramp</span>    <input type="range" id="s-ramp" min="1" max="30" step="1" value="3"> <span class="val" id="v-ramp">0.3s</span></div>

    <div class="sec">color</div>
    <div class="row"><span class="lbl">bg</span>   <input type="color" id="c-bg" value="#ffffff" class="colorpick"></div>
    <div class="row"><span class="lbl">form</span> <input type="color" id="c-fg" value="#000000" class="colorpick"></div>
    <div class="row"><span class="lbl"></span><button id="c-random" class="palette-btn">random SKL colors</button></div>

    <div class="sec">transition</div>
    <div style="display:flex;gap:6px;justify-content: space-between;">
      <span id="p-mode" class="on">● auto mode</span>
      <button id="p-btn">manual</button>
    </div>
    <div class="row dim" id="row-bl"><span class="lbl">blend</span><input type="range" id="s-bl" min="0" max="100" step="1" value="0"><span class="val" id="v-bl">0%</span></div>

  </div>
</div>

<script src="main.js"></script>
</body>
</html>
